{% set name = "datasets" %}
{% set version = "4.8.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/huggingface/{{ name }}/archive/refs/tags/{{ version }}.tar.gz
  sha256: bf00b89a4074c1607bb85537a3add1c6552f12f7759b98c20cf8982eb85da567

build:
  number: 
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed -vv
  entry_points:
    - datasets-cli=datasets.commands.datasets_cli:main
  skip: true  # [py<310]

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - filelock
    - numpy >=1.17
    - pyarrow >=21.0.0
    - dill >=0.3.0,<0.4.2
    - pandas
    - requests >=2.32.2
    - httpx <1.0.0
    - tqdm >=4.66.3
    - python-xxhash
    - multiprocess <0.70.20
    # fsspec[http]
    - fsspec >=2023.1.0,<=2026.2.0
    - aiohttp !=4.0.0a0,!=4.0.0a1
    - huggingface_hub >=0.25.0,<2.0
    - packaging
    - pyyaml >=5.1
  run_constrained:
    # AUDIO_REQUIRE
    - torchcodec >=0.6.0
    #- pytorch >=2.8.0
    # VISION_REQUIRE
    - pillow >=9.4.0
    # BENCHMARKS_REQUIRE
    #- tensorflow-base ==2.12.0
    #- pytorch ==2.0.1
    - transformers >=4.30.1
    # QUALITY_REQUIRE
    - ruff >=0.3.0
    # PDFS_REQUIRE
    - pdfplumber >=0.11.4
    # NIBABEL_REQUIRE
    - nibabel >=5.3.2
    - ipyniivue ==2.4.2
    # jax
    - jax >=0.3.14
    - jaxlib >=0.3.14
    # tensorflow_gpu
    #- tensorflow-base >=2.6.0

