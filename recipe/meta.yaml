# E   ValueError: Compression type zstd not supported
{% set deselect_tests = deselect_tests + " --deselect=tests/test_filesystem.py::test_compression_filesystems" %}  # [py<314]
{% set deselect_tests = deselect_tests + " --deselect=tests/test_streaming_download_manager.py::test_streaming_dl_manager_extract_all_supported_single_file_compression_types" %}  # [py<314]

# E   AttributeError: module 'subprocess' has no attribute '_USE_VFORK'
{% set deselect_tests = deselect_tests + " --deselect=tests/test_dataset_dict.py::DatasetDictTest::test_serialization" %}  # [py==314]

test:
  source_files:
    - tests
    - src
  imports:
    - datasets
    - datasets.commands
    - datasets.utils
    - datasets.arrow_dataset
    - datasets.arrow_reader
    - datasets.arrow_writer
    - datasets.builder
    - datasets.combine
    - datasets.config
    - datasets.data_files
    - datasets.dataset_dict
    - datasets.distributed
    - datasets.download
    - datasets.exceptions
    - datasets.features
    - datasets.filesystems
    - datasets.fingerprint
    - datasets.formatting
    - datasets.hub
    - datasets.info
    - datasets.inspect
    - datasets.io
    - datasets.iterable_dataset
    - datasets.load
    - datasets.naming
    - datasets.packaged_modules
    - datasets.parallel
    - datasets.search
    - datasets.splits
    - datasets.streaming
    - datasets.table
  requires:
    - absl-py
    - decorator
    - openjdk 17.*
    - pillow >=9.4.0
    - pip
    - pyspark >=3.4
    - pytest
    - zstandard
    # tests/utils.py:10: in <module>
    # from distutils.util import strtobool
    # E   ModuleNotFoundError: No module named 'distutils'
    - setuptools  # [py==314]
    # Remove constraints on these packages when they will be available for Python 3.14 on the main channel.
    - h5py  # [py<314]
    - pytorch-cpu  # [py<314]
  commands:
    - pip check
    - datasets-cli --help
    - pytest -v {{ test_files | join(' ') }} {{ deselect_tests }}

about:
  home: https://github.com/huggingface/datasets
  summary: HuggingFace community-driven open-source library of datasets
  description: |
    Datasets is a lightweight library providing two main features:

    - one-line dataloaders for many public datasets: one-liners to download and pre-process any of the number of datasets major public datasets (text datasets in 467 languages and dialects, image datasets, audio datasets, etc.) provided on the HuggingFace Datasets Hub. With a simple command like squad_dataset = load_dataset("squad"), get any of these datasets ready to use in a dataloader for training/evaluating a ML model (Numpy/Pandas/PyTorch/TensorFlow/JAX),
    - efficient data pre-processing: simple, fast and reproducible data pre-processing for the above public datasets as well as your own local datasets in CSV/JSON/text/PNG/JPEG/etc. With simple commands like `processed_dataset = dataset.map(process_example)`, efficiently prepare the dataset for inspection and ML model evaluation and training.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE  
  doc_url: https://huggingface.co/docs/datasets/index
  dev_url: https://github.com/huggingface/datasets

extra:
  recipe-maintainers:
    - oblute
    - Tata17
    - thewchan
    - mxr-conda
    - wietsedv
